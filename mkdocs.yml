site_name: Open Audio Tools
site_url: https://openaudiotools.com/
site_description: Open-source hardware and software platform for music creators
repo_url: https://github.com/openaudiotools/about
repo_name: openaudiotools/about

docs_dir: docs

nav:
  - Overview: README.md
  - Rationale: rationale.md
  - Devices: devices/index.md
  - Components: components/index.md
  - Networking: networking.md
  - Ecosystem Notes: ecosystem-notes.md

theme:
  name: material
  logo: images/logos/dark_oatlogo1a_tiny_transparrent_nowhitespace.png
  favicon: images/logos/oatlogo1a_tiny.png
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
