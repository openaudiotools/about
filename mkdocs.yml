site_name: Open Audio Tools
site_url: https://openaudiotools.github.io/about/
site_description: Open-source hardware and software platform for music creators
repo_url: https://github.com/openaudiotools/about
repo_name: openaudiotools/about

docs_dir: docs

nav:
  - Overview: README.md
  - Rationale: rationale.md
  - Devices:
      - Overview: devices/index.md
      - HubTee: devices/hubtee.md
      - VoiceTee: devices/voicetee.md
      - StringTee: devices/stringtee.md
  - Networking: networking.md
  - Ecosystem Notes: ecosystem-notes.md

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
